<!DOCTYPE html>
<!-- Full-screen page (login / register / 404 / lock). NO shell: no <template>, no shell.js/app.js, no mountShell. -->
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — SAARVIX</title>
  <script>try{if(localStorage.getItem("saarvix-theme")==="dark")document.documentElement.classList.add("dark")}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tw-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="min-h-screen grid lg:grid-cols-2">
    <!-- Brand panel -->
    <div class="relative hidden lg:flex flex-col justify-between p-10 bg-gradient-to-br from-primary via-primary to-teal text-white overflow-hidden">
      <div class="absolute -top-20 -right-20 size-72 rounded-full bg-white/10 blur-2xl"></div>
      <div class="flex items-center gap-2.5 relative">
        <div class="grid size-10 place-items-center rounded-lg bg-white/15 font-bold text-lg">S</div>
        <span class="font-display text-xl font-bold tracking-tight">SAARVIX</span>
      </div>
      <div class="relative">
        <h1 class="font-display text-3xl font-bold leading-tight">Win more leads,<br>across every channel.</h1>
        <ul class="mt-6 space-y-3 text-white/90 text-sm">
          <li class="flex items-center gap-2"><i data-lucide="check" class="size-4"></i>AI calling, WhatsApp, email & social</li>
          <li class="flex items-center gap-2"><i data-lucide="check" class="size-4"></i>Pipeline, automation & reports</li>
          <li class="flex items-center gap-2"><i data-lucide="check" class="size-4"></i>Built to scale with your team</li>
        </ul>
      </div>
    </div>

    <!-- Form panel -->
    <div class="flex items-center justify-center p-6 bg-background">
      <div class="w-full max-w-sm">
        <div class="lg:hidden flex items-center gap-2.5 mb-8"><div class="grid size-9 place-items-center rounded-lg bg-gradient-to-br from-primary to-teal text-white font-bold">S</div><span class="font-display font-bold">SAARVIX</span></div>
        <h2 class="font-display text-2xl font-bold">Welcome back</h2>
        <p class="text-sm text-muted-foreground mt-1">Sign in to your workspace.</p>
        <form class="mt-6 space-y-4" onsubmit="return false">
          <div><label class="label">Email</label><input class="input" type="email" placeholder="you@company.com"></div>
          <div>
            <label class="label">Password</label>
            <div class="relative"><input id="pw" class="input pr-10" type="password" placeholder="••••••••">
              <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-ghost btn-icon btn-sm" onclick="const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password'"><i data-lucide="eye" class="size-4"></i></button>
            </div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2"><span class="switch"><input type="checkbox"><span class="track"></span></span>Remember me</label>
            <a href="forgot-password.html" class="text-primary hover:underline">Forgot password?</a>
          </div>
          <button class="btn btn-primary w-full">Sign in</button>
        </form>

        <div class="my-6 flex items-center gap-3">
          <div class="h-px flex-1 bg-border"></div><span class="text-xs text-muted-foreground">or continue with</span><div class="h-px flex-1 bg-border"></div>
        </div>
        <div class="space-y-3">
          <button class="btn btn-outline w-full justify-center gap-2.5 font-semibold"><span data-brand="google"></span>Continue with Google</button>
          <button class="btn btn-outline w-full justify-center gap-2.5 font-semibold"><span data-brand="microsoft"></span>Continue with Microsoft</button>
          <button class="btn btn-outline w-full justify-center gap-2.5 font-semibold"><span data-brand="linkedin"></span>Continue with LinkedIn</button>
        </div>

        <p class="text-sm text-muted-foreground text-center mt-6">Don't have an account? <a href="register.html" class="text-primary hover:underline">Sign up</a></p>
      </div>
    </div>
  </div>

  <!-- Brand SVGs (Lucide has no brand logos; genuine brand colors allowed) -->
  <template id="brand-google"><svg class="size-4" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.6 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C39.9 35.8 44 30.4 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg></template>
  <template id="brand-microsoft"><svg class="size-4" viewBox="0 0 23 23" aria-hidden="true"><path fill="#F25022" d="M1 1h10v10H1z"/><path fill="#7FBA00" d="M12 1h10v10H12z"/><path fill="#00A4EF" d="M1 12h10v10H1z"/><path fill="#FFB900" d="M12 12h10v10H12z"/></svg></template>
  <template id="brand-linkedin"><svg class="size-4" viewBox="0 0 24 24" aria-hidden="true"><path fill="#0A66C2" d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.8 0 0 .78 0 1.74v20.52C0 23.22.8 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.74V1.74C24 .78 23.2 0 22.22 0z"/></svg></template>

  <script>
    document.querySelectorAll("[data-brand]").forEach(function (el) {
      var tpl = document.getElementById("brand-" + el.getAttribute("data-brand"));
      if (tpl) el.appendChild(tpl.content.cloneNode(true));
    });
    lucide.createIcons();
  </script>
</body>
</html>
